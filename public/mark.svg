  <path d="M28 28 L28 50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Top-right arch -->
  <path d="M59 50 L59 28 A13 13 0 0 1 85 28 L85 50" stroke="currentColor" stroke-width="4.5" stroke-linecap="round" fill="none"/>
